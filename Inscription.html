<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven-trip Inscription</title>
    <link rel="stylesheet" href="inscription.css">
    
</head>
<body>
    <section class="inscription">
        <div class="Entet">
            <h1>SEVEN-TRIP🚖</h1>
            <P>Votre partenaire de transport !</P>
        </div>
       
        <div class="cartee">
            <h2>Inscription 📜</h2>

           <input type="text" id="nom" placeholder="Nom">
           <input type="text" id="prenom" placeholder="Prenoms">
           <input type="email" id="email" placeholder="Email (Facultatif)">
           <input type="text" id="utilisateur" placeholder="Nom d'utilisateur">
           <input type="password" id="mdp" placeholder="Mot de passe">
           <input type="password" id="mdp-conf" placeholder="Confirmer votre mot de passe">

            <button class="btn-inscription" onclick="inscription()">S'inscrire</button>

            <p class="lien">
                Déja un compte? <a href="Connexion.html">Se connecter</a>
            </p>
        </div>
    </section>
     <script src="script.js"></script>
</body>
</html>
